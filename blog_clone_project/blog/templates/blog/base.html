<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Medium Style Editor -->
    <script src="//cdn.jsdelivr.net/npm/medium-editor@latest/dist/js/medium-editor.min.js"></script>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/medium-editor@latest/dist/css/medium-editor.min.css" type="text/css" media="screen" charset="utf-8">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/blog.css' %}" type="text/css" media="screen" charset="utf-8">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">

</head>
<body>
    <!-- Spacer container above the navbar. -->
    <div class="container mt-5">
    </div>
    <!-- Navbar -->
    <div class="container ">
        <nav class="navbar sancreek-regular navbar-expand-lg bg-body-tertiary ">
            <div class="container-fluid">
                <!-- Brand link that returns to the main post list. -->
                <a class="navbar-brand bigbrand" href="{% url 'blog:post_list' %}">My Blog</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <!-- Public navigation links. -->
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="{% url 'blog:about' %}">About</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="https://github.com/andreininu89">Github</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="https://www.linkedin.com/in/andrei-ninu-919611146/">LinkedIn</a></li>
                    </ul>
                    <ul class="navbar-nav navbar-right">
                        {% if user.is_authenticated %}
                            <!-- Authenticated users can create and manage posts. -->
                            <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="{% url 'blog:post_new' %}">New Post</a>
                            </li>
                            <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="{% url 'blog:draft_list' %}">Drafts</a>
                            </li>
                            <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="{% url 'logout' %}">Logout</a>
                            </li>
                            <li class="nav-item">
                            <a class="nav-link active" aria-current="page" >Welcome: {{ user.username }}</a>
                            </li>
                        {% else %}
                            <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="{% url 'login' %}">Login</a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- Content Block -->
    <div class="container content">
        <div class="row">
            <div class="col-md-8">
                <div class="blog_posts">
                    <!-- Child templates inject page-specific content here. -->
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
