{% extends "blog/base.html" %}
{% block content %}
    <h1>New Post</h1>
    <!-- Django renders the post form fields as paragraphs. -->
    <form class="post-form" method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="save btn btn-success" name="button">Save</button>
    </form>
    <!-- Turn the text area into a MediumEditor instance. -->
    <script>var editor = new MediumEditor('.editable');</script>
{% endblock content %}
